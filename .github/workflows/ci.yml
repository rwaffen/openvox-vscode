name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  RUBY_VERSION: "3.4"
  OPENVOX_EDITOR_SYNTAX_REF: fc73fd4e8a942dab7796017d02a98d6441c254b1

jobs:
  compile:
    name: TypeScript compile
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out extension
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

  package:
    name: Build and verify VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out extension
        uses: actions/checkout@v4

      - name: Check out editor syntax
        uses: actions/checkout@v4
        with:
          repository: voxpupuli/openvox-editor-syntax
          ref: ${{ env.OPENVOX_EDITOR_SYNTAX_REF }}
          path: dependencies/openvox-editor-syntax

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build and verify package contents
        env:
          OPENVOX_EDITOR_SYNTAX_DIR: ${{ github.workspace }}/dependencies/openvox-editor-syntax
        run: npm run check

      - name: Package VSIX
        run: |
          mkdir -p artifacts
          ./node_modules/.bin/vsce package --out artifacts/openvox-vscode-ci.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: openvox-vscode-ci
          path: artifacts/openvox-vscode-ci.vsix
          if-no-files-found: error
